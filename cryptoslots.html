<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://kpmnqeeiypjfkdkatrdi.supabase.co";

const supabaseKey = "sb_publishable_ym-Pi6XjRZb6mquFTlS23Q_FbiWY9R4";

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);


// Submit Review

async function addReview(){

    const username = document.getElementById("username").value.trim();

    const rating = Number(
        document.getElementById("rating").value
    );

    const comment = document.getElementById("comment").value.trim();


    if(username === "" || comment === ""){

        alert("Please enter a nickname and review");
        return;

    }


    const { error } = await supabase
    .from("reviews")
    .insert([
        {
            username: username,
            rating: rating,
            comment: comment
        }
    ]);


    if(error){

        console.error("Supabase Error:", error);

        alert(
            "Error submitting review:\n" + error.message
        );

        return;

    }


    alert("Review submitted!");

    document.getElementById("username").value = "";
    document.getElementById("comment").value = "";

    loadReviews();

}



// Load Reviews

async function loadReviews(){


    const { data, error } = await supabase

    .from("reviews")

    .select("*")

    .order("created_at", {
        ascending:false
    });



    if(error){

        console.error(error);

        document.getElementById("reviews").innerHTML =
        `
        <p style="color:red;">
        Error loading reviews:
        ${error.message}
        </p>
        `;

        return;

    }



    let html = "";



    if(data.length === 0){

        html =
        `
        <p>
        No reviews yet. Be the first!
        </p>
        `;

    }



    data.forEach(review => {


        html +=

        `
        <div style="
        border-bottom:1px solid #555;
        padding:15px 0;
        ">


        <h3 class="gold">

        ${escapeHTML(review.username)}

        </h3>


        <p>

        Rating:
        ${"⭐".repeat(review.rating)}

        </p>


        <p>

        ${escapeHTML(review.comment)}

        </p>


        </div>
        `;


    });



    document.getElementById("reviews").innerHTML = html;


}



// Prevent HTML injection

function escapeHTML(text){

    return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");

}



// Start loading reviews

loadReviews();


</script>
